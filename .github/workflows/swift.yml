name: Swift Build and Test
on:
  push:
  pull_request:

jobs:
  macos-build:
    name: Build and Test on macOS
    runs-on: macos-15
    steps:
      - name: Select Xcode 16.3
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16.3*.app | head -n 1)
          echo "Using Xcode at $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version
      - uses: actions/checkout@v4
      - name: Build
        run: swift build --package-path Core
      - name: Test
        run: swift test --package-path Core

  ubuntu-build:
    name: Build and Test on Ubuntu
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Setup Swift 6.1
        uses: swift-actions/setup-swift@v2
        with:
          swift-version: "6.1"
      - name: Build
        run: swift build --package-path Core
      - name: Test
        run: swift test --package-path Core

  xcodebuild-test:
    name: Xcodebuild test on macOS
    runs-on: macos-15
    steps:
      - name: Select Xcode 16.3
        run: |
          XCODE_PATH=$(ls -d /Applications/Xcode_16.3*.app | head -n 1)
          echo "Using Xcode at $XCODE_PATH"
          sudo xcode-select -s "$XCODE_PATH/Contents/Developer"
          xcodebuild -version
      - uses: actions/checkout@v4
      - name: Install MeCab
        run: |
          brew install mecab mecab-ipadic
          echo "MeCab version: $(mecab --version)"
      - name: Build MoZukuGrammar
        run: |
          HOST_ARCH="$(uname -m)"
          cmake -B MoZukuGrammar/build -S MoZukuGrammar \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_OSX_ARCHITECTURES="${HOST_ARCH}" \
            -DCMAKE_OSX_DEPLOYMENT_TARGET=13.0
          cmake --build MoZukuGrammar/build
      - name: Create placeholder model files (not in repo due to size)
        run: |
          mkdir -p azooKeyMac/Resources/base_n5_lm
          mkdir -p azooKeyMac/Resources/zenz-v3.1-small-gguf
          touch azooKeyMac/Resources/base_n5_lm/lm_c_abc.marisa
          touch azooKeyMac/Resources/base_n5_lm/lm_u_xbc.marisa
          touch azooKeyMac/Resources/base_n5_lm/lm_u_abx.marisa
          touch azooKeyMac/Resources/base_n5_lm/lm_r_xbx.marisa
          touch azooKeyMac/Resources/zenz-v3.1-small-gguf/ggml-model-Q5_K_M.gguf
      - name: List available schemes
        run: xcodebuild -project azooKeyMac.xcodeproj -list
      - name: Test building azooKeyMac (Release configuration)
        run: |
          HOST_ARCH="$(uname -m)"
          xcodebuild \
            -project azooKeyMac.xcodeproj \
            -scheme azooKeyMac \
            -configuration Release \
            -destination 'generic/platform=macOS' \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            ARCHS="${HOST_ARCH}" \
            ONLY_ACTIVE_ARCH=YES

  swiftlint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Install SwiftLint
        run: |
          brew update
          brew install swiftlint
      - name: Check SwiftLint version
        run: swiftlint version
      - name: Run SwiftLint
        run: swiftlint --quiet --strict
